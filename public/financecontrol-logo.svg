  <!-- Texto -->
  <text x="80" y="36" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="500" fill="#1d4ed8" letter-spacing="-0.3">Finance</text>
  <text x="80" y="62" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#0f172a" letter-spacing="-0.3">Control</text>
