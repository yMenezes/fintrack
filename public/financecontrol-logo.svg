  <rect x="17" y="18" width="12" height="48" rx="3" fill="#60a5fa"/>
  <rect x="34" y="6" width="12" height="60" rx="3" fill="#1d4ed8"/>
  <path d="M0 64 Q17 44 34 22 L48 12" fill="none" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="48" cy="12" r="4" fill="#1e40af"/>

